<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="verify.title">تفعيل الحساب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>

<div id="site-header"></div>

<main class="main-content auth-shell">
  <div class="auth-card card card-pad" id="verify-card">
    <h2 data-i18n="verify.title"></h2>
    <p class="muted" id="verify-subtitle" data-i18n="verify.subtitle" style="margin-bottom:24px;"></p>

    <div class="form-error" id="form-error"></div>

    <form id="verify-form">
      <div class="field">
        <label data-i18n="common.verificationCode"></label>
        <input type="text" id="code" inputmode="numeric" autocomplete="one-time-code" required minlength="4" maxlength="10" class="mono" style="letter-spacing:0.3em; text-align:center; font-size:1.2rem;">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
        <span data-i18n="verify.confirmButton"></span>
      </button>
    </form>

    <p class="text-center" style="margin-top:20px;">
      <button class="btn btn-ghost btn-sm" id="resend-btn" data-i18n="verify.resendButton"></button>
    </p>
  </div>

  <div class="auth-card card card-pad text-center" id="success-card" hidden>
    <div class="confirm-check">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="m5 13 4 4L19 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h2 data-i18n="verify.successMessage"></h2>
    <a href="index.html" class="btn btn-primary" style="margin-top:16px;" data-i18n="nav.home"></a>
  </div>
</main>

<div id="site-footer"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/layout.js"></script>
<script>
(async function () {
  await I18n.init();
  Layout.mount(null);
  if (!Auth.requireAuth()) return;

  const user = Auth.getUser();
  if (user?.is_verified) {
    document.getElementById("verify-card").hidden = true;
    document.getElementById("success-card").hidden = false;
    document.querySelector("#success-card h2").textContent = I18n.t("verify.alreadyVerified");
  }

  const form = document.getElementById("verify-form");
  const errorBox = document.getElementById("form-error");
  const submitBtn = document.getElementById("submit-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.classList.remove("visible");
    submitBtn.disabled = true;
    try {
      const updatedUser = await Api.post("/auth/verify/confirm", { code: document.getElementById("code").value.trim() }, { auth: true });
      const token = Auth.getToken();
      Auth.setSession(token, updatedUser);
      document.getElementById("verify-card").hidden = true;
      document.getElementById("success-card").hidden = false;
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.add("visible");
    } finally {
      submitBtn.disabled = false;
    }
  });

  document.getElementById("resend-btn").addEventListener("click", async () => {
    try {
      await Api.post("/auth/verify/request", {}, { auth: true });
      Layout.toast(I18n.t("verify.resentMessage"), "success");
    } catch (err) {
      Layout.toast(err.message, "error");
    }
  });
})();
</script>
</body>
</html>
