<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="auth.registerTitle">إنشاء حساب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>

<div id="site-header"></div>

<main class="main-content auth-shell">
  <div class="auth-card card card-pad">
    <h2 data-i18n="auth.registerTitle"></h2>
    <p class="muted" data-i18n="auth.registerSubtitle" style="margin-bottom:24px;"></p>

    <div class="form-error" id="form-error"></div>

    <form id="register-form">
      <div class="field">
        <label data-i18n="auth.fullName"></label>
        <input type="text" id="full_name" required minlength="2">
      </div>

      <div class="field">
        <label data-i18n="auth.signupVia"></label>
        <div class="segmented">
          <input type="radio" name="contact_method" id="cm-email" value="email" checked>
          <label for="cm-email" data-i18n="auth.signupViaEmail"></label>
          <input type="radio" name="contact_method" id="cm-phone" value="phone">
          <label for="cm-phone" data-i18n="auth.signupViaPhone"></label>
        </div>
      </div>

      <div class="field">
        <label id="email-label" data-i18n="auth.email"></label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label id="phone-label" data-i18n="auth.phoneOptional"></label>
        <input type="tel" id="phone" autocomplete="tel">
      </div>

      <div class="field">
        <label data-i18n="auth.password"></label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password">
        <div class="hint" data-i18n="auth.passwordHint"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
        <span data-i18n="auth.registerButton"></span>
      </button>
    </form>

    <p class="text-center" style="margin-top:20px;">
      <span data-i18n="auth.haveAccount"></span>
      <a href="login.html" data-i18n="auth.loginInstead"></a>
    </p>
  </div>
</main>

<div id="site-footer"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/theme.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/layout.js"></script>
<script>
(async function () {
  await I18n.init();
  Layout.mount(null);

  if (Auth.isLoggedIn()) window.location.href = "index.html";

  const form = document.getElementById("register-form");
  const errorBox = document.getElementById("form-error");
  const submitBtn = document.getElementById("submit-btn");
  const emailInput = document.getElementById("email");
  const phoneInput = document.getElementById("phone");
  const emailLabel = document.getElementById("email-label");
  const phoneLabel = document.getElementById("phone-label");

  function syncContactMethod() {
    const method = document.querySelector('input[name="contact_method"]:checked').value;
    if (method === "email") {
      emailInput.required = true;
      phoneInput.required = false;
      emailLabel.setAttribute("data-i18n", "auth.email");
      phoneLabel.setAttribute("data-i18n", "auth.phoneOptional");
    } else {
      emailInput.required = false;
      phoneInput.required = true;
      emailLabel.setAttribute("data-i18n", "auth.emailOptional");
      phoneLabel.setAttribute("data-i18n", "auth.phone");
    }
    I18n.translateDom(form);
  }
  document.querySelectorAll('input[name="contact_method"]').forEach((el) => el.addEventListener("change", syncContactMethod));
  syncContactMethod();

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.classList.remove("visible");
    submitBtn.disabled = true;

    try {
      const data = await Api.post("/auth/register", {
        full_name: document.getElementById("full_name").value.trim(),
        email: emailInput.value.trim() || null,
        phone: phoneInput.value.trim() || null,
        contact_method: document.querySelector('input[name="contact_method"]:checked').value,
        password: document.getElementById("password").value,
        preferred_language: I18n.lang,
      });
      Auth.setSession(data.access_token, data.user);
      // Same ?next= rule as login.html: only bare same-site .html names,
      // so the parameter can't redirect to another origin.
      const next = new URLSearchParams(window.location.search).get("next") || "";
      window.location.href = /^[\w-]+\.html$/.test(next) ? next : "index.html";
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.add("visible");
      submitBtn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
