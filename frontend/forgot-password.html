<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="forgotPassword.title">استعادة كلمة المرور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>

<div id="site-header"></div>

<main class="main-content auth-shell">

  <!-- Step 1: request a code -->
  <div class="auth-card card card-pad" id="request-card">
    <h2 data-i18n="forgotPassword.title"></h2>
    <p class="muted" data-i18n="forgotPassword.subtitle" style="margin-bottom:24px;"></p>

    <div class="form-error" id="request-error"></div>

    <form id="request-form">
      <div class="field">
        <label data-i18n="auth.identifier"></label>
        <input type="text" id="identifier" required autocomplete="username">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="request-btn">
        <span data-i18n="forgotPassword.sendCodeButton"></span>
      </button>
    </form>

    <p class="text-center" style="margin-top:20px;">
      <a href="login.html" data-i18n="forgotPassword.backToLogin"></a>
    </p>
  </div>

  <!-- Step 2: enter code + new password -->
  <div class="auth-card card card-pad" id="reset-card" hidden>
    <h2 data-i18n="forgotPassword.title"></h2>
    <p class="muted" id="reset-subtitle" style="margin-bottom:24px;"></p>

    <div class="form-error" id="reset-error"></div>

    <form id="reset-form">
      <div class="field">
        <label data-i18n="common.verificationCode"></label>
        <input type="text" id="code" inputmode="numeric" required minlength="4" maxlength="10" class="mono" style="letter-spacing:0.3em; text-align:center; font-size:1.2rem;">
      </div>
      <div class="field">
        <label data-i18n="forgotPassword.newPasswordLabel"></label>
        <input type="password" id="new_password" required minlength="8" autocomplete="new-password">
        <div class="hint" data-i18n="auth.passwordHint"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="reset-btn">
        <span data-i18n="forgotPassword.resetButton"></span>
      </button>
    </form>

    <p class="text-center" style="margin-top:20px;">
      <button class="btn btn-ghost btn-sm" id="resend-btn" data-i18n="forgotPassword.resendCode"></button>
    </p>
  </div>

  <!-- Step 3: success -->
  <div class="auth-card card card-pad text-center" id="success-card" hidden>
    <div class="confirm-check">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="m5 13 4 4L19 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h2 data-i18n="forgotPassword.successMessage" style="font-size:1.3rem;"></h2>
    <a href="login.html" class="btn btn-primary" style="margin-top:16px;" data-i18n="forgotPassword.goToLogin"></a>
  </div>

</main>

<div id="site-footer"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/layout.js"></script>
<script>
(async function () {
  await I18n.init();
  Layout.mount(null);
  if (Auth.isLoggedIn()) window.location.href = "index.html";

  let identifier = "";

  const requestCard = document.getElementById("request-card");
  const resetCard = document.getElementById("reset-card");
  const successCard = document.getElementById("success-card");

  document.getElementById("request-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById("request-error");
    errorBox.classList.remove("visible");
    const btn = document.getElementById("request-btn");
    btn.disabled = true;

    identifier = document.getElementById("identifier").value.trim();
    try {
      await Api.post("/auth/password/forgot", { identifier });
      document.getElementById("reset-subtitle").textContent = I18n.t("forgotPassword.codeSentMessage");
      requestCard.hidden = true;
      resetCard.hidden = false;
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.add("visible");
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById("reset-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById("reset-error");
    errorBox.classList.remove("visible");
    const btn = document.getElementById("reset-btn");
    btn.disabled = true;

    try {
      await Api.post("/auth/password/reset", {
        identifier,
        code: document.getElementById("code").value.trim(),
        new_password: document.getElementById("new_password").value,
      });
      resetCard.hidden = true;
      successCard.hidden = false;
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.add("visible");
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById("resend-btn").addEventListener("click", async () => {
    try {
      await Api.post("/auth/password/forgot", { identifier });
      Layout.toast(I18n.t("forgotPassword.codeSentMessage"), "success");
    } catch (err) {
      Layout.toast(err.message, "error");
    }
  });
})();
</script>
</body>
</html>
