# ============================================================
# Clinic Booking System - Backend stack (Portainer-ready)
#
# Deploy from Portainer (recommended):
#   Stacks -> Add stack -> Repository
#     Repository URL : https://github.com/I3mk132/ClinicSystem
#     Compose path   : backend/docker-compose.yml
#   Then fill in the environment variables (SECRET_KEY etc.) and deploy.
#
# Or from a shell on the VPS (inside the uploaded backend/ folder):
#   docker compose up -d --build
# ============================================================

services:
  clinic-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: clinic-backend:latest
    container_name: clinic-api
    restart: unless-stopped
    ports:
      # host:container - change the left side if 8000 is taken on the VPS,
      # or remove "ports" entirely and attach a reverse proxy network instead.
      - "8001:8000"
    environment:
      ENVIRONMENT: production
      APP_NAME: "Clinic Booking System"

      # REQUIRED - the container refuses to start in production with the
      # default secret. Generate one:
      #   python -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in the stack environment}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}

      # Managed Postgres on Neon. Paste the Neon connection string into the
      # DATABASE_URL stack variable, but change the scheme to the SQLAlchemy
      # form and keep SSL:
      #   postgresql+psycopg2://USER:PASSWORD@ep-xxx-pooler.REGION.aws.neon.tech/DBNAME?sslmode=require
      # Use Neon's *pooled* host (the one with "-pooler") for a web app.
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Neon connection string}

      # Comma-separated list of origins allowed to call the API - set this to
      # wherever the frontend is served from (scheme + host, no trailing slash).
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5500,http://127.0.0.1:5500}

      # First admin account (created on first start; change after first login)
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@myclinic.com}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:?Set FIRST_ADMIN_PASSWORD in the stack environment}
      FIRST_ADMIN_NAME: ${FIRST_ADMIN_NAME:-Clinic Administrator}

      # Fresh production DB starts empty (no demo doctors/departments)
      SEED_DEMO_DATA: "false"

      # Clinic's local timezone - slot availability ("today", "past times")
      # is computed in this zone. e.g. Europe/Istanbul, Asia/Riyadh, Asia/Damascus
      TZ: ${TZ:-Europe/Istanbul}

      # OTP delivery. Defaults to "console" (codes appear in container logs -
      # view in Portainer -> container -> Logs). For real email set
      # EMAIL_PROVIDER=smtp and the SMTP_* values.
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@myclinic.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Clinic Booking System}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    volumes:
      - clinic_data:/data
    # DB is Neon (managed, external) - no local db service to wait on.

  # --- Cloudflare Tunnel: exposes the API at https://api.dijivoo.com --------
  # No inbound ports opened on the VPS - cloudflared dials OUT to Cloudflare.
  # In the Cloudflare Zero Trust dashboard, set the tunnel's Public Hostname:
  #   Subdomain: api   Domain: dijivoo.com   Service: http://clinic-api:8000
  # Then put the tunnel token in the TUNNEL_TOKEN stack variable.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: clinic-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?Set TUNNEL_TOKEN in the stack environment}
    depends_on:
      - clinic-api

volumes:
  clinic_data:
